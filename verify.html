<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prism | Bill Verification</title>
<link rel="icon" href="https://prismhealthcare.in/prism1.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
    max-width: 460px;
    width: 100%;
    padding: 40px 36px;
    text-align: center;
  }
  .brand { display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
  .brand img { height: 40px; width: auto; object-fit: contain; }

  .icon-wrap {
    width: 84px; height: 84px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 38px;
  }
  .icon-wrap.valid { background: #d1fae5; }
  .icon-wrap.invalid { background: #fee2e2; }
  .icon-wrap.loading { background: #eef2ff; }

  .spinner {
    width: 36px; height: 36px; border: 4px solid #c7d2fe; border-top-color: #4f46e5;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  h1 { font-size: 19px; font-weight: 900; margin: 0 0 6px; letter-spacing: -0.3px; }
  h1.valid { color: #059669; }
  h1.invalid { color: #dc2626; }
  h1.loading { color: #4338ca; }
  p.sub { color: #64748b; font-size: 13px; margin: 0 0 26px; line-height: 1.6; }

  .details { background: #f8fafc; border-radius: 18px; padding: 18px 22px; text-align: left; margin-bottom: 20px; }
  .row { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid #eef0f5; font-size: 13px; }
  .row:last-child { border-bottom: none; }
  .row .label { color: #94a3b8; font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; white-space: nowrap; }
  .row .value { color: #0f172a; font-weight: 800; text-align: right; }

  .search-box { margin-top: 6px; }
  .search-box label {
    display: block; font-size: 10px; font-weight: 800; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; text-align: left;
  }
  .search-box input {
    width: 100%; padding: 14px 16px; border-radius: 14px; border: 1.5px solid #e2e8f0;
    font-size: 14px; font-weight: 700; margin-bottom: 14px; box-sizing: border-box; color: #0f172a;
  }
  .search-box input:focus { outline: none; border-color: #4f46e5; }
  .search-box button {
    width: 100%; padding: 14px; border: none; border-radius: 14px; background: #4f46e5;
    color: #fff; font-weight: 800; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.5px; cursor: pointer;
  }
  .search-box button:hover { background: #4338ca; }

  .footer-note { font-size: 10.5px; color: #94a3b8; line-height: 1.6; margin-top: 20px; }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <img src="https://prismhealthcare.in/prism1.png" alt="Prism Physiotherapy">
  </div>

  <div id="result-icon" class="icon-wrap loading"><div class="spinner"></div></div>
  <h1 id="result-title" class="loading">Checking records…</h1>
  <p class="sub" id="result-sub">Contacting Prism Physiotherapy's clinical database to verify this document. This only takes a moment.</p>

  <div class="details" id="details-block" style="display:none">
    <div class="row"><span class="label">Patient</span><span class="value" id="d-name">-</span></div>
    <div class="row"><span class="label">Patient ID</span><span class="value" id="d-id">-</span></div>
    <div class="row"><span class="label">Bill / Ref No.</span><span class="value" id="d-stmt">-</span></div>
    <div class="row"><span class="label">Amount / Status</span><span class="value" id="d-total">-</span></div>
    <div class="row"><span class="label">Date</span><span class="value" id="d-date">-</span></div>
  </div>

  <div class="search-box" id="search-box" style="display:none">
    <label for="manual-billno">Bill / Statement Number</label>
    <input type="text" id="manual-billno" placeholder="Recipt Number">
    <button onclick="manualLookup()">Verify Now</button>
  </div>

  <p class="footer-note">Verified live against Prism Physiotherapy &amp; Rehabilitation Center's clinical records.</p>
</div>

<script>
    // Must match the Apps Script Web App URL used in the dashboard (SCRIPT_URL)
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyknqWUwUFsjAmFapjZBmziezQ-eedS8IpXv1A5qLu2_OXUQ1euHMWuqaZ-lyGe8F0lxQ/exec';

    function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
    }

    function setState(type, title, sub) {
        const iconWrap = document.getElementById('result-icon');
        const titleEl = document.getElementById('result-title');
        const subEl = document.getElementById('result-sub');
        iconWrap.className = 'icon-wrap ' + type;
        if (type === 'loading') {
            iconWrap.innerHTML = '<div class="spinner"></div>';
        } else {
            iconWrap.innerHTML = type === 'valid' ? '&#9989;' : '&#10060;';
        }
        titleEl.className = type;
        titleEl.innerText = title;
        subEl.innerText = sub;
    }

    function formatDateDMY(dateStr) {
        if (!dateStr) return '-';
        const parts = String(dateStr).split('T')[0].split('-');
        if (parts.length === 3 && parts[0].length === 4) return `${parts[2]}-${parts[1]}-${parts[0]}`;
        return dateStr;
    }

    function renderDetails(info) {
        if (!info) return;
        document.getElementById('details-block').style.display = 'block';
        document.getElementById('d-name').innerText = info.name || '-';
        document.getElementById('d-id').innerText = info.id || '-';
        if (info.diagnosis) {
            document.getElementById('d-diag-row').style.display = 'flex';
            document.getElementById('d-diag').innerText = info.diagnosis;
        }
        document.getElementById('d-stmt').innerText = info.stmt || '-';
        const isNumericTotal = !isNaN(parseFloat(info.total)) && isFinite(info.total);
        document.getElementById('d-total').innerText = isNumericTotal ? ('₹' + Number(info.total).toLocaleString()) : String(info.total || '-');
        document.getElementById('d-date').innerText = formatDateDMY(info.dateStr);
    }

    async function lookup(billNo) {
        setState('loading', 'Checking records…', 'Contacting Prism Physiotherapy\'s clinical database to verify this document.');
        document.getElementById('details-block').style.display = 'none';
        document.getElementById('search-box').style.display = 'none';

        const url = `${SCRIPT_URL}?billNo=${encodeURIComponent(billNo)}&format=json`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('Bad response: ' + res.status);
            const result = await res.json();

            renderDetails(result.info);

            if (result.valid) {
                setState('valid', 'Verified Genuine', result.message || 'This bill matches Prism Physiotherapy\'s records.');
            } else {
                setState('invalid', 'Verification Failed', result.message || 'This bill could not be verified against Prism\'s records.');
                document.getElementById('search-box').style.display = 'block';
            }
        } catch (err) {
            setState('invalid', 'Could Not Reach Verification Server', 'We were unable to contact Prism\'s clinical database right now. Please check your connection and try again.');
            document.getElementById('search-box').style.display = 'block';
        }
    }

    function manualLookup() {
        const val = document.getElementById('manual-billno').value.trim();
        if (!val) return;
        history.replaceState(null, '', `?billNo=${encodeURIComponent(val)}`);
        lookup(val);
    }

    document.getElementById('manual-billno').addEventListener('keyup', (e) => {
        if (e.key === 'Enter') manualLookup();
    });

    (function init() {
        const billNo = getParam('billNo');
        if (billNo) {
            lookup(billNo);
        } else {
            setState('loading', 'Verify a Bill', 'Enter the Bill/Statement Number printed on your document below to check its authenticity.');
            document.getElementById('result-icon').innerHTML = '';
            document.getElementById('search-box').style.display = 'block';
        }
    })();
</script>

</body>
</html>
