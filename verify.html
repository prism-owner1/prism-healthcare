<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism | Verification Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .brand-navy { background-color: #0f1b3d; }
        .brand-indigo { background-color: #4f46e5; }
        .brand-orange { color: #F5860A; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-10">

    <!-- TOP LOGO -->
    <div class="mb-10 text-center">
        <div class="text-3xl font-black italic tracking-tighter text-[#0f1b3d] flex items-center justify-center gap-2">
            <div class="w-10 h-10 brand-navy rounded-xl flex items-center justify-center text-white text-xl not-italic">P</div>
            PRISM
        </div>
        <p class="text-[10px] font-extrabold uppercase tracking-[0.3em] text-slate-400 mt-2">Clinical Intelligence Verification</p>
    </div>

    <!-- MAIN RESULT CARD -->
    <div class="max-w-md w-full glass-card rounded-[2.5rem] shadow-2xl overflow-hidden mb-8">
        
        <? if (data && data.valid) { ?>
            <!-- SUCCESS STATE -->
            <div class="bg-emerald-500 p-8 text-center text-white">
                <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-white/30">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-xl font-black uppercase tracking-tight">Authenticated</h2>
                <p class="text-emerald-100 text-xs font-bold mt-1">Live Clinical Record Found</p>
            </div>

            <div class="p-8 space-y-5">
                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                    <div class="mb-4">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Patient Name</label>
                        <div class="text-lg font-bold text-slate-800"><?= data.info.name ?></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Clinical ID</label>
                            <div class="font-black text-indigo-600"><?= data.info.id ?></div>
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Status</label>
                            <div class="font-bold text-slate-700"><?= type === 'bill' ? 'Billed' : 'Active' ?></div>
                        </div>
                    </div>
                </div>

                <? if (type === 'bill') { ?>
                <div class="flex justify-between items-center px-4">
                    <span class="text-xs font-bold text-slate-400 uppercase">Billed Amount</span>
                    <span class="text-2xl font-black text-slate-900">₹<?= data.info.total ?></span>
                </div>
                <? } else { ?>
                <div class="px-4">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Medical Diagnosis</label>
                    <div class="text-sm font-bold text-slate-700 italic">"<?= data.info.diag ?>"</div>
                </div>
                <? } ?>
            </div>

        <? } else { ?>
            <!-- FAILED / INITIAL STATE -->
            <div class="bg-rose-500 p-8 text-center text-white">
                <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-white/30">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                </div>
                <h2 class="text-xl font-black uppercase tracking-tight"><?= data ? 'Invalid Record' : 'Verification Portal' ?></h2>
                <p class="text-rose-100 text-xs font-bold mt-1"><?= data ? 'Data Mismatch' : 'Waiting for scan...' ?></p>
            </div>
            <div class="p-8 text-center">
                <p class="text-slate-500 text-sm font-medium leading-relaxed">
                    <?= data ? 'This document does not match our clinic records. It may have been altered or deleted.' : 'Scan a document QR code or enter a Patient ID below to verify records.' ?>
                </p>
            </div>
        <? } ?>

        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Verified against Prism Clinical Database</p>
        </div>
    </div>

    <!-- VERIFY ANOTHER SECTION -->
    <div class="max-w-md w-full glass-card rounded-[2.5rem] p-8 shadow-lg">
        <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
            <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            Verify Another Document
        </h3>
        <div class="flex flex-col gap-3">
            <input type="text" id="manual-pid" placeholder="Enter Patient ID (e.g. POC26/1001)" 
                class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-sm focus:ring-2 focus:ring-indigo-500 transition-all">
            <button onclick="manualVerify()" class="w-full brand-navy text-white font-black py-4 rounded-2xl shadow-xl hover:bg-slate-800 transition-all uppercase text-[10px] tracking-widest">
                Search Clinical Records
            </button>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="mt-10 text-center opacity-40">
        <p class="text-[10px] font-bold text-slate-500">&copy; 2026 Prism Physiotherapy Clinical Services</p>
    </div>

    <script>
        function manualVerify() {
            const pid = document.getElementById('manual-pid').value.trim();
            if (!pid) return alert("Please enter a valid Patient ID");
            
            // Redirect to the same script with the PID parameter
            const baseUrl = "<?= scriptUrl ?>";
            window.location.href = baseUrl + "?pid=" + encodeURIComponent(pid);
        }
    </script>
</body>
</html>
