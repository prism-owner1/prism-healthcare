<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prism | Bill Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 24px; }
  .card { background: #fff; border-radius: 28px; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12); max-width: 460px; width: 100%; padding: 40px 36px; text-align: center; }
  .brand { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 28px; }
  .brand .logo-badge { width: 32px; height: 32px; background: #4f46e5; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-style: italic; font-size: 16px; }
  .brand span { font-weight: 900; letter-spacing: -0.5px; font-size: 18px; text-transform: uppercase; font-style: italic; color: #0f172a; }
  .icon-wrap { width: 84px; height: 84px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 38px; }
  .icon-wrap.valid { background: #d1fae5; }
  .icon-wrap.invalid { background: #fee2e2; }
  .icon-wrap.loading { background: #eef2ff; }
  .spinner { width: 36px; height: 36px; border: 4px solid #c7d2fe; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 19px; font-weight: 900; margin: 0 0 6px; letter-spacing: -0.3px; }
  h1.valid { color: #059669; }
  h1.invalid { color: #dc2626; }
  h1.loading { color: #4338ca; }
  p.sub { color: #64748b; font-size: 13px; margin: 0 0 26px; line-height: 1.6; }
  .details { background: #f8fafc; border-radius: 18px; padding: 18px 22px; text-align: left; margin-bottom: 20px; }
  .row { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid #eef0f5; font-size: 13px; }
  .row:last-child { border-bottom: none; }
  .row .label { color: #94a3b8; font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; white-space: nowrap; }
  .row .value { color: #0f172a; font-weight: 800; text-align: right; }
  .fallback { font-size: 11.5px; color: #94a3b8; margin-top: 6px; }
  .fallback a { color: #4f46e5; font-weight: 700; text-decoration: none; }
  .footer-note { font-size: 10.5px; color: #94a3b8; line-height: 1.6; }
</style>
</head>
<body>

<div class="card">
  <img src="prism1.png" alt="Prism Physiotherapy Logo" class="h-14 md:h-16 w-auto object-contain transition-transform duration-300 group-hover:scale-105">

  <div id="result-icon" class="icon-wrap loading"><div class="spinner"></div></div>
  <h1 id="result-title" class="loading">Checking records…</h1>
  <p class="sub" id="result-sub">Contacting Prism Physiotherapy's clinical database to verify this document. This only takes a moment.</p>

  <div class="details" id="details-block" style="display:none">
    <div class="row"><span class="label">Patient</span><span class="value" id="d-name">-</span></div>
    <div class="row"><span class="label">Patient ID</span><span class="value" id="d-id">-</span></div>
    <div class="row" id="d-diag-row" style="display:none"><span class="label">Condition</span><span class="value" id="d-diag">-</span></div>
    <div class="row"><span class="label">Bill / Ref No.</span><span class="value" id="d-stmt">-</span></div>
    <div class="row"><span class="label">Amount / Status</span><span class="value" id="d-total">-</span></div>
    <div class="row"><span class="label">Date</span><span class="value" id="d-date">-</span></div>
  </div>

  <p class="fallback" id="fallback-link" style="display:none"></p>
  <p class="footer-note">Verified live against Prism Physiotherapy &amp; Rehabilitation Center's clinical records.</p>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpUwzXhsnugslPE7arCA2yNrH-OD5akCWQvEXAk24JWA37tZllNkg31vJzXHyUCRi0Yg/exec';

    function getParam(name) { return new URLSearchParams(window.location.search).get(name); }

    function setState(type, title, sub) {
        const iconWrap = document.getElementById('result-icon');
        const titleEl = document.getElementById('result-title');
        const subEl = document.getElementById('result-sub');
        iconWrap.className = 'icon-wrap ' + type;
        iconWrap.innerHTML = type === 'valid' ? '&#9989;' : (type === 'invalid' ? '&#10060;' : '');
        if (type === 'loading') iconWrap.innerHTML = '<div class="spinner"></div>';
        titleEl.className = type;
        titleEl.innerText = title;
        subEl.innerText = sub;
    }

    function formatDateDMY(dateStr) {
        if (!dateStr) return '-';
        const parts = String(dateStr).split('T')[0].split('-');
        if (parts.length === 3 && parts[0].length === 4) return `${parts[2]}-${parts[1]}-${parts[0]}`;
        return dateStr;
    }

    function renderDetails(info) {
        if (!info) return;
        document.getElementById('details-block').style.display = 'block';
        document.getElementById('d-name').innerText = info.name || '-';
        document.getElementById('d-id').innerText = info.id || '-';
        if (info.diagnosis) {
            document.getElementById('d-diag-row').style.display = 'flex';
            document.getElementById('d-diag').innerText = info.diagnosis;
        }
        document.getElementById('d-stmt').innerText = info.stmt || '-';
        const isNumericTotal = !isNaN(parseFloat(info.total)) && isFinite(info.total);
        document.getElementById('d-total').innerText = isNumericTotal ? ('₹' + Number(info.total).toLocaleString()) : String(info.total || '-');
        document.getElementById('d-date').innerText = formatDateDMY(info.dateStr);
    }

    function buildFallbackLink() {
        const url = new URL(SCRIPT_URL);
        const currentParams = new URLSearchParams(window.location.search);
        currentParams.forEach((v, k) => url.searchParams.set(k, v));
        const el = document.getElementById('fallback-link');
        el.innerHTML = `Having trouble? <a <p class="text-blue-200 font-bold uppercase tracking-widest text-xs"> Contact Clinical Support</p>
                        <div class="flex items-center gap-4">
                <a href="https://wa.me/919708059081"
                    class="bg-green-600 text-white px-5 py-2 rounded-full hidden md:flex items-center gap-2 font-bold text-sm hover:scale-105 transition-transform shadow-md">
                    <i data-lucide="message-circle" class="w-4 h-4"></i> WhatsApp`;
        el.style.display = 'block';
    }

    async function runVerification() {
        const billNo = getParam('billNo');
        const id = getParam('id');
        const stmt = getParam('stmt');
        const sum = getParam('sum');
        const pid = getParam('pid');

        if (!billNo && !pid && !(id && stmt && sum)) {
            setState('invalid', 'Incomplete Verification Link', 'This QR code or link is missing required data and cannot be checked. Please re-scan the original document.');
            buildFallbackLink();
            return;
        }

        const query = new URLSearchParams(window.location.search);
        query.set('format', 'json');
        const requestUrl = `${SCRIPT_URL}?${query.toString()}`;

        try {
            const res = await fetch(requestUrl, { method: 'GET' });
            if (!res.ok) throw new Error('Bad response: ' + res.status);
            const result = await res.json();

            renderDetails(result.info);

            if (result.valid) {
                setState('valid', 'Verified Genuine', result.message || 'This document matches Prism Physiotherapy\'s records.');
            } else {
                setState('invalid', 'Verification Failed', result.message || 'This document could not be verified against Prism\'s records.');
                buildFallbackLink();
            }
        } catch (err) {
            setState('invalid', 'Could Not Reach Verification Server', 'We were unable to contact Prism\'s clinical database right now. Please check your connection and try again, or use the link below.');
            buildFallbackLink();
        }
    }

    runVerification();
</script>

</body>
</html>
